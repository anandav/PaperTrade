name: Deploy Server to Azure Container Apps

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

env:
  DO_REGISTRY: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}
  IMAGE_NAME: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/papertrade-api
  CONTAINER_APP_NAME: apiadirevandcom
  RESOURCE_GROUP: api_adirevand.com-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Log in to DigitalOcean Container Registry
      uses: docker/login-action@v3
      with:
        registry: registry.digitalocean.com
        username: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        password: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

    - name: Build and push Docker image
      working-directory: ./server
      run: |
        docker build -f Dockerfile.production \
          -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -t ${{ env.IMAGE_NAME }}:latest .
        docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.IMAGE_NAME }}:latest

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS_SERVICE }}

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        containerAppName: ${{ env.CONTAINER_APP_NAME }}
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        imageToDeploy: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        registryUrl: registry.digitalocean.com
        registryUsername: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        registryPassword: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
